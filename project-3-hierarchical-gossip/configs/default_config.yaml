clustering:
  linkage: ward
  method: agglomerative
  n_clusters: 5
  similarity_metric: cosine
data:
  batch_size: 64
  clients_per_domain: 3
  data_dir: ./data
  dataset: cifar100
  dirichlet_alpha: 0.5
  n_domains: 5
gossip:
  n_neighbors: 2
  topology: ring
logging:
  log_dir: ./logs
  save_every: 10
  verbose: true
model:
  base: resnet18
  lora_alpha: 32
  lora_rank: 16
  lora_target_modules:
  - fc
  num_classes: 100
  pretrained: true
training:
  learning_rate: 0.001
  local_epochs: 5
  n_rounds: 2
  optimizer: adam
  seed: 42
  weight_decay: 0.0001
