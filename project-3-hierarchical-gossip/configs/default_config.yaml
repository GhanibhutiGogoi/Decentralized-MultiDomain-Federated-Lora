data:
  dataset: cifar100
  n_domains: 5
  clients_per_domain: 3
  dirichlet_alpha: 0.5
  batch_size: 64
  data_dir: ./data

model:
  base: resnet18
  pretrained: true
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules: ["fc"]
  num_classes: 100

training:
  local_epochs: 5
  learning_rate: 0.001
  n_rounds: 50
  optimizer: adam
  weight_decay: 0.0001
  seed: 42

gossip:
  topology: ring
  n_neighbors: 2

clustering:
  method: agglomerative
  linkage: ward
  n_clusters: 5
  similarity_metric: cosine

logging:
  log_dir: ./logs
  save_every: 10
  verbose: true
